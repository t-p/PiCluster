---
apiVersion: v1
kind: Service
metadata:
  name: pihole-headless
  namespace: dns
  labels:
    app: pihole
    component: dns-service
spec:
  clusterIP: None
  selector:
    app: pihole
    component: dns-server
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: web
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: dns
  labels:
    app: pihole
    component: dns-service
spec:
  type: LoadBalancer
  selector:
    app: pihole
    component: dns-server
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
      nodePort: 31021
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
      nodePort: 31021
  externalTrafficPolicy: Cluster
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: dns
  labels:
    app: pihole
    component: web-service
spec:
  type: NodePort
  selector:
    app: pihole
    component: dns-server
    statefulset.kubernetes.io/pod-name: pihole-0  # Route to first StatefulSet pod only
  ports:
    - name: web
      port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 31080
  externalTrafficPolicy: Cluster
